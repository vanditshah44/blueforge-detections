name: detections-ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install toolchain
        run: python -m pip install -r requirements.txt

      - name: Lint Sigma schema
        run: sigma check rules/

      - name: Rule policy tests
        run: pytest -q

      - name: Compile to Splunk SPL + Sentinel KQL
        run: python tools/convert.py

      - name: Upload compiled detections
        uses: actions/upload-artifact@v4
        with:
          name: compiled-detections
          path: build/
          if-no-files-found: error
